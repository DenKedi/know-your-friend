kind = "web"
previewPath = "/"
title = "Know Your Friend"
version = "1.0.0"
id = "artifacts/know-your-friend"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20717

[services.development]
run = "pnpm --filter @workspace/know-your-friend run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/know-your-friend", "run", "build" ]
publicDir = "artifacts/know-your-friend/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20717"
BASE_PATH = "/"
